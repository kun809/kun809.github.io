theme: jekyll-theme-chirpy

lang: zh-CN
timezone:

title: kun809's page
tagline: kun809's page
description: >-
  kun809's page

url: "https://kun809.github.io"
baseurl: ""

github:
  username: kun809

social:
  name: kun809
  email: zhukun85@gmail.com
  links:
    - https://github.com/kun809
    - https://www.linkedin.com/in/steven-zhu-311b40198

webmaster_verifications:
  google: 3dafca6fc1fbcdb3

theme_mode:
toc: true
paginate: 10

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

plugins:
  - jekyll-paginate
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - "*.gem"
  - "*.gemspec"
  - README.md
  - LICENSE
  - "package*.json"
  - _posts/2016-05-19-super-short-article.md
  - _posts/2016-05-20-my-example-post.md
  - _posts/2016-05-20-super-long-article.md
  - _posts/2016-05-20-this-post-demonstrates-post-content-styles.md
  - _posts/2016-05-20-welcome-to-jekyll.md